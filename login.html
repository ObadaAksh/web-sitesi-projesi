    <main>
        <section id="loginBolumu">
            <h1>Sisteme Giriş</h1>
            <form method="POST">
                
                <div>
                    <label for="emailInput">E-posta:</label>
                    <input type="email" id="emailInput" name="user_email" required placeholder="example@sakarya.edu.tr">
                </div>

                <br>

                <div>
                    <label for="passwordInput">Şifre:</label>
                    <input type="password" id="passwordInput" name="user_password" required placeholder="Öğrenci Numaranız">
                </div>

                <br>

                <div>
                    <button type="submit">Giriş Yap</button>
                    <button type="reset">Temizle</button>
                </div>

            </form>
        </section>
    </main>
