    <main class="container my-5">
        <section id="iletisimFormu" class="card shadow-sm mx-auto iletisim-kutu">
            <div class="card-header bg-primary text-white text-center">
                <h2 class="h4 mb-0">İletişim Formu</h2>
            </div>
            <div class="card-body p-4">
                <form action="gonder.php" method="POST" id="mainForm">
                    
                    <div id="adAlani" class="mb-3">
                        <label for="adSoyad" class="form-label">Ad Soyad:</label>
                        <input type="text"  v-model="form.ad" name="ad" id="adSoyad" class="form-control">
                    </div>

                    <div id="emailAlani" class="mb-3">
                        <label for="e-posta" class="form-label">E-posta:</label>
                        <input type="email"  v-model="form.email" name="email" id="e-posta" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="iletisimTel" class="form-label">İletişim No:</label>
                        <input type="text"  v-model="form.tel" name="iletisim" id="iletisimTel" class="form-control" placeholder="Örn: 05xx xxx xx xx">
                    </div>

                    <div id="cinsiyetAlani" class="mb-3">
                        <label class="form-label d-block">Cinsiyet:</label>

                        <input type="radio" v-model="form.cinsiyet" name="cinsiyet" value="Erkek" id="erkekRadio" class="form-check-input">
                        <label for="erkekRadio" class="form-check-label me-3">Erkek</label>

                        <input type="radio" v-model="form.cinsiyet" name="cinsiyet" value="Kadin" id="kadinRadio" class="form-check-input">
                        <label for="kadinRadio" class="form-check-label">Kadın</label>
                    </div>

                    <div id="ilgialanlariAlani" class="mb-3">
                        <label class="form-label d-block">İlgi Alanlarım:</label>
                        <input type="checkbox" name="spor" value="Spor" v-model="form.ilgiler" id="sporCheckbox" class="form-check-input">
                        <label for="sporCheckbox" class="form-check-label me-2">Spor</label>
                        <input type="checkbox" name="yazilim" value="Yazılım" v-model="form.ilgiler" id="yazilimCheckbox" class="form-check-input">
                        <label for="yazilimCheckbox" class="form-check-label me-2">Yazılım</label>
                        <input type="checkbox" name="kitapOkumak" value="Kitap Okumak" v-model="form.ilgiler" id="kitapOkumakCheckbox" class="form-check-input">
                        <label for="kitapOkumakCheckbox" class="form-check-label">Kitap Okumak</label>
                    </div>

                    <div class="mb-3">
                        <label for="sehir" class="form-label">Şehir:</label>
                        <select id="sehir" v-model="form.sehir" name="Sehir" class="form-select">
                            <option value="">Seçiniz</option>
                            <option value="Sakarya">Sakarya</option>
                            <option value="İstanbul">İstanbul</option>
                            <option value="Ankara">Ankara</option>
                        </select>    
                    </div>

                    <div class="mb-3">
                        <label for="mesajTextarea" class="form-label">Mesajınız:</label>
                        <textarea id="mesajTextarea" v-model="form.mesaj" name="mesaj" class="form-control" rows="4"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-info text-white" onclick="jsKontrolu()">Native JS ile Denetle</button>
                        <button type="button" class="btn btn-success"  @click="validateVue" id="vueSubmit">Vue.js ile Denetle</button>
                        <button type="reset" class="btn btn-secondary">Temizle</button>
                    </div>
                </form>
            </div>
        </section>
